<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">
        <h2>CGPA Calculator</h2>
        <p class="sub">Enter credits & grades</p>

        <input type="text" id="credits" placeholder="Credits (e.g. 3,4,5)">
        <input type="text" id="grades" placeholder="Grades (e.g. 8,9,10)">

        <button onclick="calculate()">Calculate CGPA</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
